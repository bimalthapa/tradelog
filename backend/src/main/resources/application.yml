spring:
  datasource:
    url: jdbc:sqlite:${user.home}/tradelog/tradelog.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA foreign_keys = ON"
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
tradelog:
  price:
    cache-ttl-minutes: 5
    timeout-seconds: 3
